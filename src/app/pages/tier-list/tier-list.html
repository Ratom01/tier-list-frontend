<p>tier-list works!</p>
<table class="table border">
    <tr class="">
        <th class="rank-head">Rank</th>
        <th class="attacktype-head">Attacker</th>
        <th class="attacktype-head">Defender</th>
        <th class="attacktype-head">Supporter</th>
    </tr>
    <tr class="rank" *ngFor="let rank of rankTypes">
        <td [style.background-color]="rank[1][1]">{{rank[0]}}</td>
        <td>
            <ng-container *ngFor="let c of attacker">
               <mini-character-card *ngIf="c['story'] == rank[0]"
                [ranking]="c"
               >
                </mini-character-card> 
            </ng-container>
        </td>
        <td>
            <ng-container *ngFor="let c of defender">
               <mini-character-card *ngIf="c['story'] == rank[0]"
                [ranking]="c"
               >
                </mini-character-card> 
            </ng-container>
        </td>
        <td>
            <ng-container *ngFor="let c of supporter">
               <mini-character-card *ngIf="c['story'] == rank[0]"
                [ranking]="c"
               >
                </mini-character-card> 
            </ng-container>
        </td>
    </tr>
</table>
